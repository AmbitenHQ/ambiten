name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version and Publish
    runs-on: ubuntu-latest

    services:
      mongodb:
       image: mongo:7
       ports:
         - 27017:27017
       options: >-
         --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
         --health-interval 10s
         --health-timeout 5s
         --health-retries 5
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/ambiten_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
      
      - name: Wait for MongoDB
        run: |
         for i in {1..30}; do
         node -e "const { MongoClient } = require('mongodb'); MongoClient.connect('mongodb://127.0.0.1:27017', { serverSelectionTimeoutMS: 1000 }).then(c => c.close()).then(() => process.exit(0)).catch(() => process.exit(1))" && exit 0
         sleep 2
         done
         exit 1

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm build:ordered

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}