name: CI

on:
  pull_request:
    branches:
      - main
      - next
  push:
    branches:
      - main
      - next

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test -- --runInBand --detectOpenHandles

      - name: Build
        run: pnpm build:ordered

      - name: Build Docs
        run:  pnpm docs:api

      - name: Pack packages
        run: pnpm -r pack

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-artifacts-node-${{ matrix.node-version }}
          path: |
            packages/**/*.tgz
            dist/**/*.tgz
          if-no-files-found: ignore
