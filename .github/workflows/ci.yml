name: CI

on:
  pull_request:
    branches:
      - main
      - next
  push:
    branches:
      - main
      - next

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    services:
      mongodb:
       image: mongo:7
       ports:
         - 27017:27017
       options: >-
         --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
         --health-interval 10s
         --health-timeout 5s
         --health-retries 5
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/ambiten_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
      
      - name: Wait for MongoDB
        run: |
         for i in {1..30}; do
         node -e "const { MongoClient } = require('mongodb'); MongoClient.connect('mongodb://127.0.0.1:27017', { serverSelectionTimeoutMS: 1000 }).then(c => c.close()).then(() => process.exit(0)).catch(() => process.exit(1))" && exit 0
         sleep 2
         done
         exit 1

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm build:ordered

      - name: Build Docs
        run:  pnpm docs:api

      - name: Pack packages
        run: pnpm -r pack

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-artifacts-node-${{ matrix.node-version }}
          path: |
            packages/**/*.tgz
            dist/**/*.tgz
          if-no-files-found: ignore
