<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="tenraTitle tenraDesc">
  <title id="tenraTitle">Tenra Logo</title>
  <desc id="tenraDesc">Tenra logo with geometric runtime icon, wordmark, and tagline Runtime Context. Reliable Outcomes.</desc>

  <defs>
    <linearGradient id="tenraIconGradient" x1="365" y1="165" x2="485" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12C7F5" />
      <stop offset="0.48" stop-color="#2563EB" />
      <stop offset="1" stop-color="#06185F" />
    </linearGradient>

    <linearGradient id="tenraOrbitGradient" x1="280" y1="500" x2="910" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B35E8" />
      <stop offset="0.52" stop-color="#2563EB" />
      <stop offset="1" stop-color="#12B8B3" />
    </linearGradient>

    <linearGradient id="tenraDividerGradient" x1="230" y1="730" x2="970" y2="730" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B35E8" />
      <stop offset="0.52" stop-color="#2563EB" />
      <stop offset="1" stop-color="#12B8B3" />
    </linearGradient>

    <filter id="softShadow" x="230" y="110" width="740" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#06185F" flood-opacity="0.14" />
    </filter>
  </defs>

  <rect width="1200" height="900" fill="#FFFFFF" />

  <!-- Runtime orbit arcs -->
  <path d="M485 175C595 95 785 112 878 230" stroke="url(#tenraOrbitGradient)" stroke-width="18" stroke-linecap="round" />
  <path d="M390 505C304 560 219 535 180 475" stroke="url(#tenraOrbitGradient)" stroke-width="18" stroke-linecap="round" />

  <!-- Runtime nodes -->
  <circle cx="875" cy="230" r="48" fill="#12B8B3" />
  <circle cx="180" cy="475" r="48" fill="#8B35E8" />

  <!-- Geometric T icon -->
  <g filter="url(#softShadow)">
    <path d="M310 255H646L562 340H392C348 340 310 304 310 260V255Z" fill="url(#tenraIconGradient)" />
    <path d="M560 255H768C811 255 846 290 846 333V356C846 399 811 434 768 434H700C678 434 660 452 660 474V570C660 625 616 670 561 670H532C496 670 467 641 467 605V408L560 315V255Z" fill="url(#tenraIconGradient)" />
    <path d="M555 350L650 255H560L465 350H555Z" fill="#FFFFFF" opacity="0.95" />
  </g>

  <!-- Wordmark -->
  <text x="600" y="690" text-anchor="middle" font-family="Inter, Montserrat, Arial, sans-serif" font-size="132" font-weight="800" letter-spacing="24" fill="#06185F">TENRA</text>
  <circle cx="860" cy="655" r="13" fill="#12B8B3" />

  <!-- Divider -->
  <line x1="230" y1="735" x2="970" y2="735" stroke="url(#tenraDividerGradient)" stroke-width="5" stroke-linecap="round" />
  <circle cx="600" cy="735" r="15" fill="#FFFFFF" stroke="#4F46E5" stroke-width="6" />

  <!-- Tagline -->
  <text x="600" y="800" text-anchor="middle" font-family="Inter, Montserrat, Arial, sans-serif" font-size="32" font-weight="600" letter-spacing="9" fill="#1E293B">RUNTIME CONTEXT. RELIABLE OUTCOMES.</text>
</svg>